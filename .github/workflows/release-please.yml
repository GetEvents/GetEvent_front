name: Release Please

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Préparer la version
        uses: googleapis/release-please-action@v4
        with:
          target-branch: develop
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
