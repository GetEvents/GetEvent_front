name: Release Please

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Préparer la version
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
          target-branch: develop